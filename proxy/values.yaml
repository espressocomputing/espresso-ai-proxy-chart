replicaCount: 2

image:
  repository: espresso/proxy
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

resources:
  requests:
    cpu: 1000m
    memory: 2048Mi
  limits:
    cpu: 1500m
    memory: 3072Mi

env:
  PROXY_HOST: ""

customer: ""
apiUrl: "https://api.espressocomputing.com:25831"

apiKeySecret:
  name: ""

probes:
  readiness:
    enabled: true
    path: /healthcheck
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  liveness:
    enabled: true
    path: /healthcheck
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 2
    failureThreshold: 3

service:
  type: ClusterIP
  port: 5050
  annotations: {}

ingress:
  enabled: false
  # Supported values:
  # - generic: emit only className, hosts, TLS, and user-provided annotations
  # - aws: add AWS Load Balancer Controller ALB annotations
  # - azure: add Azure Application Gateway Ingress Controller annotations
  provider: generic
  className: ""
  host: ""
  path: /
  pathType: Prefix
  annotations: {}
  # Supports either the standard ingress TLS list or this shorthand:
  # tls:
  #   secretName: proxy-tls
  #   hosts:
  #   - proxy.example.com
  # When hosts is omitted from the shorthand, ingress.host is used.
  tls: null
  # Adds a second, hostless /healthcheck rule for external health probes that
  # do not send the application Host header, such as Azure Front Door probes.
  healthcheck:
    enabled: false
    path: /healthcheck
    pathType: Prefix
  aws:
    certificateArn: ""
    scheme: internet-facing
    targetType: ip
    listenPorts: '[{"HTTPS":443}]'
    sslRedirect: "443"
    healthcheckPath: /healthcheck
    annotations: {}
  # Backward-compatible alias for the previous AWS-only values structure.
  alb: {}
  azure:
    sslRedirect: true
    healthProbePath: /healthcheck
    appgwSslCertificate: ""
    annotations: {}

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

nodeSelector: {}
tolerations: []
affinity: {}
