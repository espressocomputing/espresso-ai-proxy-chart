name: Helm CI

on:
  push:
    branches:
      - "**"

jobs:
  full-checks:
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      CHART_DIR: proxy
      CHART_FILE: proxy/Chart.yaml
      KUBE_VERSION: "1.35.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Lint chart
        run: |
          test -f "${CHART_FILE}" || (echo "Expected ${CHART_FILE} but it does not exist." && exit 1)
          helm lint "${CHART_DIR}"

      - name: YAML lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          strict: true

      - name: Render all values files
        run: |
          set -euo pipefail
          for values_file in "${CHART_DIR}"/values*.yaml; do
            [ -f "$values_file" ] || continue
            echo "Rendering with $values_file for kube ${KUBE_VERSION}"
            helm template proxy "${CHART_DIR}" \
              --kube-version "${KUBE_VERSION}" \
              --values "$values_file" \
              > /dev/null
          done

      - name: Require chart version bump when chart files change
        run: |
          set -euo pipefail
          BASE="origin/${{ github.event.repository.default_branch }}"
          git fetch origin "${{ github.event.repository.default_branch }}:${{ github.event.repository.default_branch }}"

          if ! git diff --name-only "$BASE"...HEAD | grep -E '^proxy/(Chart.yaml|values[^/]*\.ya?ml|templates/|charts/)' > /dev/null; then
            echo "No chart changes detected."
            exit 0
          fi

          HEAD_VERSION="$(awk -F': ' '/^version:/{print $2}' "${CHART_FILE}")"
          BASE_VERSION="$(git show "$BASE:${CHART_FILE}" | awk -F': ' '/^version:/{print $2}')"

          if [ "$HEAD_VERSION" = "$BASE_VERSION" ]; then
            echo "Chart changed but version was not bumped."
            echo "Base version: $BASE_VERSION"
            echo "Head version: $HEAD_VERSION"
            exit 1
          fi

          echo "Chart version bumped: $BASE_VERSION -> $HEAD_VERSION"
