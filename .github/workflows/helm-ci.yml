name: Helm CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  full-checks:
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kube_version: ["1.28.0", "1.29.0", "1.30.0"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0

      - name: Lint changed charts with chart-testing
        run: |
          ct lint \
            --target-branch "${{ github.event.repository.default_branch }}" \
            --chart-dirs helm-charts

      - name: Render all values files (kube matrix)
        run: |
          set -euo pipefail
          for values_file in helm-charts/proxy/values*.yaml; do
            [ -f "$values_file" ] || continue
            echo "Rendering with $values_file for kube ${{ matrix.kube_version }}"
            helm template proxy helm-charts/proxy \
              --kube-version "${{ matrix.kube_version }}" \
              --values "$values_file" \
              > /dev/null
          done

      - name: Require chart version bump when chart files change
        run: |
          set -euo pipefail
          BASE="origin/${{ github.event.repository.default_branch }}"
          git fetch origin "${{ github.event.repository.default_branch }}:${{ github.event.repository.default_branch }}"

          if ! git diff --name-only "$BASE"...HEAD | grep -E '^helm-charts/proxy/' > /dev/null; then
            echo "No chart changes detected."
            exit 0
          fi

          HEAD_VERSION="$(awk -F': ' '/^version:/{print $2}' helm-charts/proxy/Chart.yaml)"
          BASE_VERSION="$(git show "$BASE:helm-charts/proxy/Chart.yaml" | awk -F': ' '/^version:/{print $2}')"

          if [ "$HEAD_VERSION" = "$BASE_VERSION" ]; then
            echo "Chart changed but version was not bumped."
            echo "Base version: $BASE_VERSION"
            echo "Head version: $HEAD_VERSION"
            exit 1
          fi

          echo "Chart version bumped: $BASE_VERSION -> $HEAD_VERSION"
