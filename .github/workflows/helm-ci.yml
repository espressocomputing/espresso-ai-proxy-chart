name: Helm CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  full-checks:
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kube_version: ["1.33.0", "1.34.0", "1.35.0"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Detect chart path
        run: |
          if [ -f "proxy/Chart.yaml" ]; then
            echo "CHART_DIR=proxy" >> "$GITHUB_ENV"
          elif [ -f "helm-charts/proxy/Chart.yaml" ]; then
            echo "CHART_DIR=helm-charts/proxy" >> "$GITHUB_ENV"
          else
            echo "Expected proxy/Chart.yaml or helm-charts/proxy/Chart.yaml."
            exit 1
          fi

      - name: Lint chart
        run: |
          helm lint "${CHART_DIR}"

      - name: YAML lint (plain YAML only)
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_file: .yamllint
          strict: false

      - name: Render all values files (kube matrix)
        run: |
          set -euo pipefail
          for values_file in "${CHART_DIR}"/values*.yaml; do
            [ -f "$values_file" ] || continue
            echo "Rendering with $values_file for kube ${{ matrix.kube_version }}"
            helm template proxy "${CHART_DIR}" \
              --kube-version "${{ matrix.kube_version }}" \
              --values "$values_file" \
              > /dev/null
          done

      - name: Require chart version bump when chart files change
        run: |
          set -euo pipefail
          BASE="origin/${{ github.event.repository.default_branch }}"
          git fetch origin "${{ github.event.repository.default_branch }}:${{ github.event.repository.default_branch }}"

          if ! git diff --name-only "$BASE"...HEAD | grep -E "^${CHART_DIR}/" > /dev/null; then
            echo "No chart changes detected."
            exit 0
          fi

          HEAD_VERSION="$(awk -F': ' '/^version:/{print $2}' "${CHART_DIR}/Chart.yaml")"
          BASE_VERSION="$(git show "$BASE:${CHART_DIR}/Chart.yaml" | awk -F': ' '/^version:/{print $2}')"

          if [ "$HEAD_VERSION" = "$BASE_VERSION" ]; then
            echo "Chart changed but version was not bumped."
            echo "Base version: $BASE_VERSION"
            echo "Head version: $HEAD_VERSION"
            exit 1
          fi

          echo "Chart version bumped: $BASE_VERSION -> $HEAD_VERSION"
