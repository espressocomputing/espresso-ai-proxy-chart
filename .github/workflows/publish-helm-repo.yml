name: Publish Helm Repo

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Detect chart path
        run: |
          if [ -f "proxy/Chart.yaml" ]; then
            echo "CHART_DIR=proxy" >> "$GITHUB_ENV"
          elif [ -f "helm-charts/proxy/Chart.yaml" ]; then
            echo "CHART_DIR=helm-charts/proxy" >> "$GITHUB_ENV"
          else
            echo "Expected proxy/Chart.yaml or helm-charts/proxy/Chart.yaml."
            exit 1
          fi

      - name: Package chart
        run: |
          mkdir -p .chart-release
          helm package "${CHART_DIR}" -d .chart-release

      - name: Build Helm repository content
        run: |
          set -euo pipefail
          mkdir -p repo

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --depth=1 origin gh-pages
            tmpdir="$(mktemp -d)"
            git archive FETCH_HEAD | tar -x -C "$tmpdir"

            if [ -f "$tmpdir/index.yaml" ]; then
              cp "$tmpdir/index.yaml" repo/index.yaml
            fi
            if ls "$tmpdir"/*.tgz >/dev/null 2>&1; then
              cp "$tmpdir"/*.tgz repo/
            fi
          fi

          cp .chart-release/*.tgz repo/

          if [ -f repo/index.yaml ]; then
            helm repo index repo \
              --url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" \
              --merge repo/index.yaml
          else
            helm repo index repo \
              --url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          fi

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: repo
